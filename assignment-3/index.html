<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 3 - Product Registry DApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <h1>Product Registry DApp</h1>
        <p>Connect MetaMask and send on-chain product transactions.</p>
        <button id="connectBtn">Connect MetaMask</button>
        <p id="walletStatus">Wallet: Not connected</p>
      </section>

      <section class="panel">
        <h2>Create Product</h2>
        <label for="productName">Product Name</label>
        <input id="productName" type="text" placeholder="Laptop" />

        <label for="productDetails">Product Details</label>
        <input id="productDetails" type="text" placeholder="Serial #123" />

        <button id="createBtn">Create Product</button>
      </section>

      <section class="panel">
        <h2>Transfer Ownership</h2>
        <label for="productId">Product ID</label>
        <input id="productId" type="number" min="1" placeholder="1" />

        <label for="newOwner">New Owner Address</label>
        <input id="newOwner" type="text" placeholder="0x..." />

        <button id="transferBtn">Transfer Ownership</button>
      </section>

      <section class="panel">
        <h2>Fetch Product</h2>
        <label for="fetchId">Product ID</label>
        <input id="fetchId" type="number" min="1" placeholder="1" />

        <button id="fetchBtn">Get Product</button>
        <pre id="output">No data yet.</pre>
      </section>

      <section class="panel">
        <h2>Transaction Status</h2>
        <pre id="txStatus">No transaction submitted yet.</pre>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
